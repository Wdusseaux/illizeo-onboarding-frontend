<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Illizeo Onboarding</title>
    <link rel="icon" type="image/png" href="/HR_Core_module_logo_O.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/base.css" />
  </head>
  <body style="margin:0;">
    <div id="root">
      <div id="initial-splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff5fb 0%,#ffffff 50%,#fef3c7 100%);z-index:9999;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
          <img src="/HR_Core_module_logo_O.png" alt="Illizeo" style="width:56px;height:56px;animation:izPulse 1.4s ease-in-out infinite;" />
          <div style="font:600 11px/1 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;">Chargement…</div>
        </div>
      </div>
    </div>
    <style>@keyframes izPulse{0%,100%{opacity:.35;transform:scale(1);}50%{opacity:.85;transform:scale(1.06);}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
